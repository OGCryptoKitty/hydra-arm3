name: Submit to Awesome Lists

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  submit-awesome-mcp-servers:
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GH_PAT }}
    steps:
      - name: Check PAT
        id: check
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "GH_PAT not set"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            gh api user --jq '"Authenticated as: " + .login'
          fi

      - name: Submit to punkpeye/awesome-mcp-servers
        if: steps.check.outputs.skip == 'false'
        run: |
          REPO="punkpeye/awesome-mcp-servers"
          BRANCH="add-hydra-regulatory-intelligence"
          FORK_OWNER=$(gh api user --jq '.login')

          EXISTING=$(gh pr list --repo "$REPO" --author "$FORK_OWNER" --json number --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" != "0" ]; then
            echo "PR already exists — skipping"
            exit 0
          fi

          gh repo fork "$REPO" --clone=false 2>/dev/null || echo "Fork exists or created"
          sleep 10

          git clone "https://x-access-token:${GH_TOKEN}@github.com/${FORK_OWNER}/awesome-mcp-servers.git" --depth 1
          cd awesome-mcp-servers

          git config user.name "$FORK_OWNER"
          git config user.email "${FORK_OWNER}@users.noreply.github.com"

          git remote add upstream "https://github.com/${REPO}.git"
          git fetch upstream --depth 1
          DEFAULT_BRANCH=$(git remote show upstream | grep 'HEAD branch' | awk '{print $NF}')
          git reset --hard "upstream/${DEFAULT_BRANCH}"

          git checkout -b "$BRANCH"

          if grep -q "HYDRA Regulatory Intelligence" README.md; then
            echo "Already listed — skipping"
            exit 0
          fi

          python3 << 'PYEOF'
          import re
          with open("README.md") as f:
              content = f.read()
          entry = "- [HYDRA Regulatory Intelligence](https://github.com/OGCryptoKitty/hydra-arm3) - Real-time SEC/CFTC/Fed regulatory risk scoring, FOMC signals, and prediction market data. 22 x402-paid endpoints on Base L2."
          for pat in [r"(###?\s*Finance[^\n]*\n(?:[-*] \[.*\n)*)", r"(###?\s*Financial[^\n]*\n(?:[-*] \[.*\n)*)"]:
              m = re.search(pat, content, re.IGNORECASE)
              if m:
                  section = m.group(1)
                  content = content.replace(section, section.rstrip("\n") + "\n" + entry + "\n")
                  print("Inserted into existing section")
                  break
          else:
              content = content.rstrip() + "\n\n### Finance & Fintech\n\n" + entry + "\n"
              print("Created new section")
          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

          git add README.md
          git commit -m "Add HYDRA Regulatory Intelligence"
          git push -f origin "$BRANCH"

          cat > /tmp/pr_body.txt << 'PRBODY'
          Adds HYDRA Regulatory Intelligence MCP server to the Finance & Fintech section.

          Server URL: https://hydra-api-nlnj.onrender.com/mcp
          Transport: Streamable HTTP
          Tools: 22 paid + 12 free (regulatory scan, FOMC signals, prediction market data, oracle feeds)
          Payment: USDC on Base via x402 ($0.001-$50)
          GitHub: https://github.com/OGCryptoKitty/hydra-arm3
          PRBODY

          gh pr create \
            --repo "$REPO" \
            --head "$FORK_OWNER:$BRANCH" \
            --title "Add HYDRA Regulatory Intelligence" \
            --body-file /tmp/pr_body.txt

          echo "PR submitted to $REPO"

  submit-awesome-x402:
