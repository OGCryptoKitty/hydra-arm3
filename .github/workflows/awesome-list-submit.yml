          fi

          echo "" >> README.md
          echo "- [HYDRA Regulatory Intelligence](https://hydra-api-nlnj.onrender.com) - Real-time regulatory risk scoring, FOMC signals, and prediction market data. 22 paid endpoints via x402. ([GitHub](https://github.com/OGCryptoKitty/hydra-arm3))" >> README.md

          git add README.md
          git commit -m "Add HYDRA Regulatory Intelligence"
          git push -f origin "$BRANCH"

          cat > /tmp/pr_body.txt << 'PRBODY'
