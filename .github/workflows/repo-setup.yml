name: Repository Setup

on:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/repo-setup.yml'
  workflow_dispatch:

jobs:
  set-topics:
    runs-on: ubuntu-latest

    steps:
      - name: Set repository topics
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: [
                'mcp-server',
                'mcp',
                'model-context-protocol',
                'x402',
                'prediction-markets',
                'polymarket',
                'kalshi',
                'regulatory-intelligence',
                'usdc',
                'base-l2',
                'fomc',
                'defi-oracle',
                'micropayments',
                'uma-oracle',
                'chainlink',
                'a2a',
                'agent-to-agent',
                'fastapi',
                'regulatory-api',
                'fred-api',
                'ai-agent',
                'autonomous-agent',
                'real-time-data'
              ]
            });
            console.log('Repository topics set successfully');

      - name: Update repository description
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: 'Autonomous regulatory intelligence API — 50+ x402 endpoints, 13 real-time data sources (FRED, KXFED, FDIC, SEC EDGAR), market-calibrated Fed rate probabilities. Pay USDC on Base L2.',
              homepage: 'https://hydra-api-nlnj.onrender.com/docs'
            });
            console.log('Repository description updated');
