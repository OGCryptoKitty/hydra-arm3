name: Repository Setup

on:
  push:
    branches: [master, main]
    paths:
      - '.github/workflows/repo-setup.yml'
  workflow_dispatch:

jobs:
  set-topics:
    runs-on: ubuntu-latest

    steps:
      - name: Set repository topics
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names: [
                'prediction-markets',
                'polymarket',
                'kalshi',
                'regulatory-api',
                'x402-payments',
                'usdc',
                'base-l2',
                'fomc',
                'defi-oracle',
                'ai-powered',
                'micropayments',
                'regulatory-intelligence',
                'federal-reserve',
                'uma-oracle',
                'chainlink'
              ]
            });
            console.log('Repository topics set successfully');

      - name: Update repository description
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            await github.rest.repos.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              description: 'AI-powered regulatory intelligence API for prediction market traders. Pay-per-use in USDC on Base L2 via x402 protocol. Covers Polymarket, Kalshi, FOMC, SEC, CFTC.',
              homepage: 'https://hydra-api-nlnj.onrender.com/docs'
            });
            console.log('Repository description updated');
