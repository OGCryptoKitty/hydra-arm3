name: Keep Alive
on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping HYDRA health endpoint
        run: |
          STATUS=$(curl -sf --retry 2 --retry-delay 5 \
            -o /dev/null -w "%{http_code}" \
            https://hydra-api-nlnj.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS — service may be cold starting"
          else
            echo "::notice::Service is warm and responding"
          fi
