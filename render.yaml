services:
  - type: web
    name: hydra-api
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: WALLET_ADDRESS
        sync: false
      - key: WALLET_PRIVATE_KEY
        sync: false
      - key: BASE_RPC_URL
        value: https://mainnet.base.org
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: HYDRA_STATE_DIR
        value: /app/data
      - key: PYTHONPATH
        value: /opt/render/project/src
    disk:
      name: hydra-data
      mountPath: /app/data
      sizeGB: 1
