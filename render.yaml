services:
  - type: web
    name: hydra-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 2 --timeout-keep-alive 30
    healthCheckPath: /health
    envVars:
      - key: WALLET_ADDRESS
        value: 0x2F12A73e1e08F3BCE12212005cCaBE2ACEf87141
      - key: BASE_RPC_URL
        value: https://mainnet.base.org
      - key: HYDRA_STATE_DIR
        value: /opt/render/project/src/data
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENFORCE_HTTPS
        value: "true"
